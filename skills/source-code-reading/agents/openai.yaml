interface:
  display_name: "Source Code Reading"
  short_description: "閱讀、追蹤與整理專案原始碼理解筆記"
  default_prompt: "Use $source-code-reading to understand an unfamiliar file, feature flow, module, or call chain. Start from a concrete entry, read only directly relevant dependencies, expand until you reach the smallest explanatory loop that answers the question, separate confirmed findings from inference, and write longer or reusable Markdown notes to a clear .md file path while keeping short answers in chat."
